name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  DOCKER_BUILD_RECORD_UPLOAD: "false"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install media test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg

      - name: Verify modules
        run: go mod verify

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run race detector
        run: go test -race -count=1 ./...

      - name: Run vet
        run: go vet ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test:run

      - name: Build production frontend
        run: bun run build

  container:
    name: Container
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Validate Compose files
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.build.yml config --quiet
          docker compose -f docker-compose.build-cn.yml config --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build test image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          load: true
          push: false
          tags: shufflemuse:ci
          build-args: |
            VERSION=ci
            REVISION=${{ github.sha }}
            BUILD_DATE=1970-01-01T00:00:00Z

      - name: Verify build identity
        run: |
          output="$(docker run --rm shufflemuse:ci --version)"
          test "$output" = "ShuffleMuse ci (commit $GITHUB_SHA, built 1970-01-01T00:00:00Z)"

      - name: Smoke test hardened container
        run: |
          cleanup() {
            docker stop shufflemuse-ci >/dev/null 2>&1 || true
            docker rm shufflemuse-ci >/dev/null 2>&1 || true
            docker volume rm shufflemuse-ci-data >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          mkdir -p /tmp/shufflemuse-ci-music
          docker volume create shufflemuse-ci-data >/dev/null
          docker run --detach \
            --name shufflemuse-ci \
            --read-only \
            --tmpfs /tmp:size=64m,mode=1777 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --pids-limit 256 \
            --publish 127.0.0.1:18080:8080 \
            --volume /tmp/shufflemuse-ci-music:/music:ro \
            --volume shufflemuse-ci-data:/data \
            --env MUSIC_DIR=/music \
            --env MUSIC_BOLTDB_PATH=/data/tags.db \
            shufflemuse:ci
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/api/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs shufflemuse-ci
          exit 1
