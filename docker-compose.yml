name: shufflemuse

services:
  shufflemuse:
    image: ghcr.io/coldercoder/shufflemuse:0.1.1
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./music:/music:ro
      - shufflemuse-data:/data
    environment:
      MUSIC_DIR: "/music"
      MUSIC_PORT: "8080"
      MUSIC_PASSWORD: ""
      MUSIC_AUTH_WHITELIST_SUBNETS: ""
      MUSIC_LOGIN_MAX_FAILURES: "3"
      MUSIC_LOGIN_BAN_SECONDS: "3600"
      MUSIC_TRUSTED_PROXY_SUBNETS: ""
      MUSIC_REAL_IP_HEADER: "remote"
      MUSIC_COOKIE_SECURE: "false"
      MUSIC_ALLOWED_HOSTS: "localhost,127.0.0.1,::1"
      MUSIC_FFMPEG_MAX_SESSIONS: "2"
      MUSIC_MEDIA_AUX_RESERVED_SESSIONS: "1"
      MUSIC_MEDIA_QUEUE_LIMIT: "8"
      MUSIC_MEDIA_AUX_QUEUE_LIMIT: "8"
      MUSIC_MEDIA_WAIT_SECONDS: "15"
      MUSIC_MEDIA_TASK_SECONDS: "15"
      MUSIC_STREAM_WRITE_IDLE_SECONDS: "60"
      MUSIC_MEDIA_NEGATIVE_CACHE_SECONDS: "30"
      MUSIC_METADATA_CACHE_ENTRIES: "4096"
      MUSIC_COVER_CACHE_ENTRIES: "128"
      MUSIC_COVER_CACHE_BYTES: "67108864"
      MUSIC_QUEUE_CACHE_MAX_QUEUES: "64"
      MUSIC_QUEUE_CACHE_BYTES: "134217728"
      MUSIC_QUEUE_IDLE_SECONDS: "86400"
      MUSIC_RESCAN_INTERVAL: "0"
      MUSIC_OPUS_BITRATE: "160"
      MUSIC_LEGACY_MUSIC_ROOT: ""
      MUSIC_BOLTDB_PATH: "/data/tags.db"
    restart: unless-stopped
    stop_grace_period: 40s
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  shufflemuse-data:
